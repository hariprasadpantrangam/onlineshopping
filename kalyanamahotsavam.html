<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matrimonial App - Admin & User Panel</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f9f9f9; }
    .section { display: none; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: white; max-width: 900px; margin: auto; }
    .active { display: block; }

    .heading { background-color:gold; color:white; text-align:center; text-transform:uppercase; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:#4CAF50; color:white; }

    .card-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; margin-top:20px; }
    .card { border:1px solid #ddd; padding:15px; border-radius:10px; text-align:center; background:#fff; box-shadow:0 4px 8px rgba(0,0,0,0.1); }
    .card h3 { margin:10px 0; }
    .logout-btn { background:#e74c3c; color:white; padding:8px 15px; border:none; border-radius:4px; cursor:pointer; margin-top:20px; }
    button { padding:8px 15px; border:none; border-radius:4px; cursor:pointer; background:#3498db; color:white; }
    input { padding:8px; margin:5px; border:1px solid #ccc; border-radius:4px; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginSection" class="section active">
    <h2 class="heading">Login</h2>
    <p>Tip: Use <b>adXXX</b> and <b>77XX</b> for Admin access.</p>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <br><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="section">
    <h2 class="heading">Admin Panel - Manage Profiles</h2>
    <div style="background:#f0f0f0; padding:15px; border-radius:5px;">
      <input type="hidden" id="editIndex">
      <input type="text" id="pName" placeholder="Name">
      <input type="number" id="pAge" placeholder="Age">
      <input type="text" id="pGender" placeholder="Gender">
      <input type="text" id="pRaasi" placeholder="Raasi/Star">
      <input type="text" id="pCaste" placeholder="Caste">
      <input type="text" id="pEducation" placeholder="Education">
      <input type="text" id="pPhoto" placeholder="Photo URL">
      <br>
      <button onclick="addProfile()">Add Profile</button>
      <button onclick="saveEdit()" style="background:#27ae60;">Update Profile</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th><th>Age</th><th>Gender</th><th>Raasi</th><th>Caste</th><th>Education</th><th>Photo</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminBody"></tbody>
    </table>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- User Panel -->
  <div id="userPanel" class="section">
    <h2 class="heading">Matrimonial Profiles</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap;">
      <div id="userCardContainer" class="card-container" style="flex:2;"></div>
      <div id="cartSection" style="flex:1; border:1px solid #ddd; padding:15px; border-radius:10px; background:#fff; min-width:250px;">
        <h3>Shortlisted Profiles 💍</h3>
        <ul id="cartItems" style="list-style:none; padding:0;"></ul>
        <hr>
        <button onclick="sendToWhatsApp()" style="background:#25D366; width:100%; font-weight:bold;">Send Interest (WhatsApp)</button>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script src="matrimonial.js"></script>
  <a href="index.html">back to home</a>
</body>
</html>
