<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matrimonial App - Admin & User Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f9f9f9; }
        .section { display: none; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: white; max-width: 1000px; margin: auto; }
        .active { display: block; }

        h1,h2 { background-color:gold; color:white; text-align:center; text-transform:uppercase; padding:10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }

        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width:100%; height:150px; object-fit:cover; border-radius:8px; margin-bottom:10px; }
        .card h3 { margin: 5px 0; }
        .logout-btn { background: #e74c3c; color:white; margin-top:20px; padding:8px 15px; border:none; border-radius:4px; cursor:pointer; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; background: #3498db; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <!-- Welcome -->
    <div id="registerSection" class="section active">
        <h1>సుస్వాగతం! Matrimonial Portal</h1>
        <button style="background:#19cbd7;" onclick="showSection('loginSection')">Login</button>
    </div>

    <!-- Login -->
    <div id="loginSection" class="section">
        <h2>Login</h2>
        <p>Tip: Use <b>adXXX</b> and <b>77XX</b> for Admin access.</p>
        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password"><br><br>
        <button onclick="login()">Login</button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="section">
        <h2>Admin Panel - Manage Profiles</h2>
        <div style="background:#f0f0f0; padding:15px; border-radius:5px;">
            <input type="hidden" id="editIndex">
            <input type="text" id="pName" placeholder="Name">
            <input type="date" id="pDob" placeholder="DOB">
            <input type="text" id="pGender" placeholder="Gender">
            <input type="text" id="pCaste" placeholder="Caste">
            <input type="text" id="pReligion" placeholder="Religion">
            <input type="text" id="pStar" placeholder="Star">
            <input type="text" id="pEducation" placeholder="Education">
            <input type="text" id="pOccupation" placeholder="Occupation">
            <input type="text" id="pMobile" placeholder="Mobile">
            <input type="file" id="pPhoto" accept="image/*">
            <button id="addBtn" onclick="addProfile()">Add Profile</button>
            <button id="updateBtn" style="display:none; background:#27ae60;" onclick="saveEdit()">Update Profile</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th><th>DOB</th><th>Gender</th><th>Caste</th><th>Religion</th>
                    <th>Star</th><th>Education</th><th>Occupation</th><th>Mobile</th><th>Photo</th><th>Actions</th>
                </tr>
            </thead>
            <tbody id="adminBody"></tbody>
        </table>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- User Panel -->
    <div id="userPanel" class="section">
        <h2>Matrimonial Profiles</h2>
        <div id="userCardContainer" class="card-container"></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script src="matrimonial.js"></script>
</body>
</html>
