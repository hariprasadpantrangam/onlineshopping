<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matrimonial App</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
    h2 { text-align:center; background:gold; color:white; padding:10px; text-transform:uppercase; }
    .form { margin-bottom:20px; text-align:center; }
    input { margin:5px; padding:8px; border:1px solid #ccc; border-radius:4px; }
    button { margin:5px; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; background:#3498db; color:white; }
    .delete-btn { background:#e74c3c; color:white; }
    .card-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; }
    .card { border:1px solid #ddd; border-radius:8px; padding:15px; text-align:left; background:#fff; }
    .card h3 { margin:5px 0; }
    .card p { margin:3px 0; font-size:14px; }
    .card img { width:100%; height:150px; object-fit:cover; border-radius:8px; margin-bottom:10px; }
  </style>
</head>
<body>

<h2>Matrimonial Profiles</h2>

<div class="form">
  <input type="text" id="name" placeholder="Name">
  <input type="date" id="dob" placeholder="DOB">
  <input type="text" id="gender" placeholder="Gender">
  <input type="text" id="caste" placeholder="Caste">
  <input type="text" id="religion" placeholder="Religion">
  <input type="text" id="star" placeholder="Star">
  <input type="text" id="education" placeholder="Education">
  <input type="text" id="occupation" placeholder="Occupation">
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="file" id="photo" accept="image/*">
  <button onclick="addProfile()">Add Profile</button>
</div>

<div id="cardContainer" class="card-container"></div>

<script>
let profiles = JSON.parse(localStorage.getItem('profiles')) || [
  { name:"Ramesh", dob:"1998-05-12", gender:"Male", caste:"OC", religion:"Hindu", star:"Mesha", education:"B.Tech", occupation:"Engineer", mobile:"9876543210", photo:"" },
  { name:"Sita", dob:"2000-09-20", gender:"Female", caste:"BC", religion:"Hindu", star:"Kanya", education:"MBA", occupation:"Manager", mobile:"9123456780", photo:"" }
];

function displayProfiles() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = "";
  profiles.forEach((p, i) => {
    container.innerHTML += `
      <div class="card">
        ${p.photo ? `<img src="${p.photo}" alt="photo">` : `<img src="https://via.placeholder.com/150" alt="no photo">`}
        <h3>${p.name}</h3>
        <p><b>DOB:</b> ${p.dob}</p>
        <p><b>Gender:</b> ${p.gender}</p>
        <p><b>Caste:</b> ${p.caste}</p>
        <p><b>Religion:</b> ${p.religion}</p>
        <p><b>Star:</b> ${p.star}</p>
        <p><b>Education:</b> ${p.education}</p>
        <p><b>Occupation:</b> ${p.occupation}</p>
        <p><b>Mobile:</b> ${p.mobile}</p>
        <button class="delete-btn" onclick="deleteProfile(${i})">Delete</button>
      </div>`;
  });
}

function addProfile() {
  const name = document.getElementById('name').value;
  const dob = document.getElementById('dob').value;
  const gender = document.getElementById('gender').value;
  const caste = document.getElementById('caste').value;
  const religion = document.getElementById('religion').value;
  const star = document.getElementById('star').value;
  const education = document.getElementById('education').value;
  const occupation = document.getElementById('occupation').value;
  const mobile = document.getElementById('mobile').value;
  const photoInput = document.getElementById('photo');

  if (name && dob && gender && mobile) {
    if (photoInput.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        profiles.push({ name, dob, gender, caste, religion, star, education, occupation, mobile, photo:e.target.result });
        saveProfiles();
        clearForm();
      };
      reader.readAsDataURL(photoInput.files[0]);
    } else {
      profiles.push({ name, dob, gender, caste, religion, star, education, occupation, mobile, photo:"" });
      saveProfiles();
      clearForm();
    }
  } else {
    alert("Please fill mandatory fields (Name, DOB, Gender, Mobile)");
  }
}

function deleteProfile(index) {
  if (confirm("Delete this profile?")) {
    profiles.splice(index, 1);
    saveProfiles();
  }
}

function saveProfiles() {
  localStorage.setItem('profiles', JSON.stringify(profiles));
  displayProfiles();
}

function clearForm() {
  document.getElementById('name').value = "";
  document.getElementById('dob').value = "";
  document.getElementById('gender').value = "";
  document.getElementById('caste').value = "";
  document.getElementById('religion').value = "";
  document.getElementById('star').value = "";
  document.getElementById('education').value = "";
  document.getElementById('occupation').value = "";
  document.getElementById('mobile').value = "";
  document.getElementById('photo').value = "";
}

// Initial render
displayProfiles();
</script>
<a href="index.html">back to home</a>
</body>
</html>
