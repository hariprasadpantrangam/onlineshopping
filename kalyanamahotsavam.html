<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matrimonial App - Admin & User Panel</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f9f9f9; padding: 20px; }
    .section { display: none; border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: white; max-width: 900px; margin: auto; }
    .active { display: block; }

    .heading { background: deeppink; color: white; text-align: center; padding: 10px; text-transform: uppercase; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
    th { background: #4CAF50; color: white; }

    .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    .card h3 { margin: 10px 0; }
    .card p { margin: 5px 0; }

    input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; background: #3498db; color: white; }
    button:hover { opacity: 0.8; }
    .logout-btn { background: #e74c3c; margin-top: 20px; }
  </style>
</head>
<body>

  <!-- Login Section -->
  <div id="loginSection" class="section active">
    <h2 class="heading">💍 Matrimonial App Login</h2>
    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">
    <br><br>
    <button onclick="login()">Login</button>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="section">
    <h2 class="heading">Admin Panel - Manage Profiles</h2>
    <div style="background: #f0f0f0; padding: 15px; border-radius: 5px;">
      <input type="hidden" id="editIndex">
      <input type="text" id="pName" placeholder="Name">
      <input type="number" id="pAge" placeholder="Age">
      <input type="text" id="pProfession" placeholder="Profession">
      <input type="text" id="pCity" placeholder="City">
      <input type="text" id="pMobile" placeholder="Mobile">
      <input type="text" id="pEducation" placeholder="Education">
      <input type="text" id="pCaste" placeholder="Caste">
      <input type="text" id="pReligion" placeholder="Religion">
      <input type="text" id="pImage" placeholder="Image URL">
      <button id="addBtn" onclick="addProfile()">Add Profile</button>
      <button id="updateBtn" style="display:none; background: #27ae60;" onclick="saveEdit()">Update Profile</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Name</th><th>Age</th><th>Profession</th><th>City</th><th>Mobile</th><th>Education</th><th>Caste</th><th>Religion</th><th>Image</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminBody"></tbody>
    </table>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- User Panel -->
  <div id="userPanel" class="section">
    <h2 class="heading">Matrimonial Profiles</h2>
    <div id="userCardContainer" class="card-container"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script src="matrimonial.js"></script>
</body>
</html>
