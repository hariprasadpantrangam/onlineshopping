<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matrimonial App</title>
  <style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

.title {
  text-align: center;
  padding: 20px;
}

.form {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  padding: 20px;
}

.form input, .form button {
  padding: 10px;
  font-size: 14px;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card-body {
  padding: 15px;
}

.card-body h3 {
  margin: 0;
}

.card-body p {
  margin: 5px 0;
}

.btn {
  margin-top: 10px;
  padding: 8px;
  background: crimson;
  color: white;
  border: none;
  width: 100%;
  cursor: pointer;
}
  </style>
 
</head>
<body>

<h1 class="title">💍 Matrimonial Profiles</h1>
<h1><marquee style="background-color: deeppink;color: white;" direction="right">welcome to kalyana mahotsavam site for more details cell:9573572830</marquee></h1>
<div class="form">
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">
  <input type="text" id="profession" placeholder="Profession">
  <input type="text" id="city" placeholder="City">
  <input type="text" id="mobile" placeholder="Mobile">
  <input type="text" id="education" placeholder="Education">
  <input type="text" id="caste" placeholder="Caste">
  <input type="text" id="religion" placeholder="Religion">
  <input type="text" id="img" placeholder="Image URL">
  <button onclick="addProfile()">Add Profile</button>
</div>

<div class="container" id="cardContainer"></div>

<script src="matrimonial.js"></script>
</body>
</html>
