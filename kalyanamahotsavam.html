<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <title>మ్యాట్రిమోనియల్</title>
  <style>
    body {
      font-family: 'Noto Sans Telugu', sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #800000;
      color: white;
      text-align: center;
      padding: 15px;
    }
    .container {
      width: 80%;
      margin: auto;
      padding: 20px;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #800000;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #a52a2a;
    }
    .profiles {
      margin-top: 30px;
    }
    .card {
      background: #fff;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 6px;
      box-shadow: 0 0 4px rgba(0,0,0,0.1);
    }
    .card img {
      max-width: 120px;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .delete-btn {
      background-color: red;
      color: white;
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
    }
    .delete-btn:hover {
      background-color: darkred;
    }
    footer {
      background-color: #800000;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
    }
    footer img {
      max-width: 200px;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🌸 కళ్యాణ మహోత్సవం(kalyana mahotsavam)🌸</h1>
    <p>మీ జీవిత భాగస్వామిని కనుగొనండి (Find your partner) పూర్తిగా ఉచితం(no payment)</p>
  </header>

  <div class="container">
    <h2>ప్రొఫైల్ నమోదు</h2>
    <form id="matriForm">
      <label>పేరు:</label>
      <input type="text" id="name" required>

      <label>వయసు:</label>
      <input type="number" id="age" required>

      <label>లింగం:</label>
      <select id="gender">
        <option value="పురుషుడు">పురుషుడు</option>
        <option value="స్త్రీ">స్త్రీ</option>
      </select>

      <label>కులం:</label>
      <input type="text" id="caste">

      <label>మతం:</label>
      <input type="text" id="religion">

      <label>విద్య:</label>
      <input type="text" id="education">

      <label>మొబైల్:</label>
      <input type="text" id="mobile">

      <label>వృత్తి:</label>
      <input type="text" id="job">

      <label>నగరం:</label>
      <input type="text" id="city">

      <label>రాశి (Star):</label>
      <input type="text" id="raasi">

      <label>ఫోటో:</label>
      <input type="file" id="photo" accept="image/*">

      <button type="submit">ప్రొఫైల్ జోడించండి</button>
    </form>

    <div class="profiles" id="profiles">
      <h2>ప్రొఫైల్ లిస్ట్</h2>
    </div>
  </div>

  <footer>
    <h2>💍 వివాహ ఫోటో గ్యాలరీ 💍</h2>
    <p>ఇక్కడ మీ వివాహ ఫోటోలను జోడించండి</p>
    <p>designed by pantrangam hariprasd cell:9573572830</p>
    <img src="../onlineshopping/public/kalyanamandapamfooter.png" alt="footer" style="height:150px; width:400px; margin-bottom:10px;">
  </footer>

  <script>
    const form = document.getElementById('matriForm');
    const profilesDiv = document.getElementById('profiles');

    let profiles = JSON.parse(localStorage.getItem('profiles')) || [];

    function renderProfiles() {
      profilesDiv.innerHTML = "<h2>ప్రొఫైల్ లిస్ట్</h2>";
      profiles.forEach((profile, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          ${profile.photo ? `<img src="${profile.photo}" alt="${profile.name}">` : ""}
          <h3>${profile.name} (${profile.gender})</h3>
          <p>వయసు: ${profile.age}</p>
          <p>కులం: ${profile.caste}</p>
          <p>మతం: ${profile.religion}</p>
          <p>విద్య: ${profile.education}</p>
          <p>మొబైల్: ${profile.mobile}</p>
          <p>వృత్తి: ${profile.job}</p>
          <p>నగరం: ${profile.city}</p>
          <p>రాశి: ${profile.raasi}</p>
          <button class="delete-btn" onclick="deleteProfile(${index})">Delete</button>
        `;
        profilesDiv.appendChild(card);
      });
    }

    function deleteProfile(index) {
      if (confirm("ఈ ప్రొఫైల్‌ను నిజంగా తొలగించాలనుకుంటున్నారా?")) {
        profiles.splice(index, 1);
        localStorage.setItem('profiles', JSON.stringify(profiles));
        renderProfiles();
      }
    }

    renderProfiles();

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const age = document.getElementById('age').value;
      const gender = document.getElementById('gender').value;
      const caste = document.getElementById('caste').value;
      const religion = document.getElementById('religion').value;
      const education = document.getElementById('education').value;
      const mobile = document.getElementById('mobile').value;
      const job = document.getElementById('job').value;
      const city = document.getElementById('city').value;
      const raasi = document.getElementById('raasi').value;
      const photoInput = document.getElementById('photo');

      let photoData = "";
      if (photoInput.files[0]) {
        const reader = new FileReader();
        reader.onload = function(event) {
          photoData = event.target.result;
          saveProfile(name, age, gender, caste, religion, education, mobile, job, city, raasi, photoData);
        };
        reader.readAsDataURL(photoInput.files[0]);
      } else {
        saveProfile(name, age, gender, caste, religion, education, mobile, job, city, raasi, "");
      }

      form.reset();
    });

    function saveProfile(name, age, gender, caste, religion, education, mobile, job, city, raasi, photo) {
      profiles.push({ name, age, gender, caste, religion, education, mobile, job, city, raasi, photo });
      localStorage.setItem('profiles', JSON.stringify(profiles));
      renderProfiles();
    }
  </script>
  <a href="index.html">back to home</a>
</body>
</html>
