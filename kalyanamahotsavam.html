<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matrimonial App</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f9f9f9; padding:20px; }
    .section { display:none; max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:8px; }
    .active { display:block; }
    h2 { text-align:center; background:gold; color:white; padding:10px; text-transform:uppercase; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ddd; padding:8px; text-align:left; }
    th { background:#4CAF50; color:white; }
    input { margin:5px; padding:8px; border:1px solid #ccc; border-radius:4px; }
    button { margin:5px; padding:8px 12px; border:none; border-radius:4px; cursor:pointer; }
    .logout-btn { background:#e74c3c; color:white; }
    .card-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; margin-top:20px; }
    .card { border:1px solid #ddd; border-radius:8px; padding:15px; text-align:center; background:#fff; }
    .card img { width:100%; height:150px; object-fit:cover; border-radius:8px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginSection" class="section active">
  <h2>Login</h2>
  <p>Tip: Use <b>adXXX</b> and <b>77XX</b> for Admin access.</p>
  <input type="text" id="loginUser" placeholder="Username">
  <input type="password" id="loginPass" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="section">
  <h2>Admin Panel - Manage Profiles</h2>
  <input type="hidden" id="editIndex">
  <input type="text" id="pName" placeholder="Name">
  <input type="number" id="pAge" placeholder="Age">
  <input type="text" id="pMobile" placeholder="Mobile">
  <input type="text" id="pReligion" placeholder="Religion">
  <input type="text" id="pGender" placeholder="Gender">
  <input type="text" id="pRaasi" placeholder="Raasi/Star">
  <input type="text" id="pCaste" placeholder="Caste">
  <input type="text" id="pEducation" placeholder="Education">
  <input type="text" id="pOccupation" placeholder="Occupation">
  <input type="text" id="pCity" placeholder="City">
  <input type="file" id="pPhoto" accept="image/*" onchange="previewPhoto(event)">
  <img id="photoPreview" style="width:80px;height:80px;border-radius:8px;margin-top:10px;display:none;"><br>
  <button id="addBtn" onclick="addProfile()">Add Profile</button>
  <button id="updateBtn" onclick="saveEdit()" style="background:#27ae60;display:none;">Update Profile</button>

  <table>
    <thead>
      <tr>
        <th>Name</th><th>Age</th><th>Mobile</th><th>Religion</th><th>Gender</th>
        <th>Raasi</th><th>Caste</th><th>Education</th><th>Occupation</th><th>City</th><th>Photo</th><th>Actions</th>
      </tr>
    </thead>
    <tbody id="adminBody"></tbody>
  </table>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<!-- User Panel -->
<div id="userPanel" class="section">
  <h2>Matrimonial Profiles</h2>
  <div style="display:flex; gap:20px; flex-wrap:wrap;">
    <div id="userCardContainer" class="card-container" style="flex:2;"></div>
    <div style="flex:1; border:1px solid #ddd; padding:15px; border-radius:8px; background:#fff;">
      <h3>Shortlisted Profiles 💍</h3>
      <ul id="cartItems" style="list-style:none; padding:0;"></ul>
      <hr>
      <button onclick="sendToWhatsApp()" style="background:#25D366; width:100%;">Send Interest (WhatsApp)</button>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<script src="matrimonial.js"></script>
</body>
</html>
