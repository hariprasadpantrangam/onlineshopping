<style>
/* 1. Remove underlines from all links inside buttons */
button a {
    text-decoration: none;
    color: inherit; /* Keeps the link color matching the button text */
    display: block; /* Makes the entire button clickable */
    background-color: deeppink;
    color:white;
}

button a:hover {
    text-decoration: none;
    /* Keeps the link color matching the button text */
    display: block; /* Makes the entire button clickable */
    background-color: green;
    color:white;
}

/* 2. Default Mobile Styles (Small screens) */
body {
    padding: 10px;
    text-align: center;
}
button {
    width: 100%; /* Full width buttons on mobile */
    margin-bottom: 10px;
    padding: 10px;
}

/* 3. Tablet Styles (Screens wider than 600px) */
@media screen and (min-width: 600px) {
    button {
        width: 45%; /* Two buttons per row */
        margin: 5px;
    }
    h1 { font-size: 24px; }
}

/* 4. Laptop/Desktop Styles (Screens wider than 1024px) */
@media screen and (min-width: 1024px) {
    button {
        width: auto; /* Normal size buttons */
        padding: 10px 20px;
   
    }
    .container-fluid {
        max-width: 1200px;
        margin: 0 auto;
    }
}


   


</style>
