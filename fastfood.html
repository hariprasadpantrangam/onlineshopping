<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rajani Fast Food Orders</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; color: darkgreen; }
    .nav-buttons { margin-bottom: 20px; text-align: center; }
    .nav-buttons button { margin: 5px; padding: 10px 20px; cursor: pointer; }
    .products { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .card { border: 1px solid #ccc; padding: 10px; width: 200px; text-align: center; }
    .card img { width: 100%; height: 150px; object-fit: cover; }
    .cart { margin-top: 30px; }
    .cart-item { margin-bottom: 10px; }
    .delete-btn { margin-left: 10px; color: red; cursor: pointer; }
    .place-order { margin-top: 15px; padding: 10px 20px; background: green; color: white; border: none; cursor: pointer; }
    #page-content { margin: 20px; padding: 15px; border: 1px solid #ccc; }
  </style>
</head>
<body>

  <h1> Prasad Fast Food Online Orders</h1>
   <h1> ప్రసాద్ ఆన్‌లైన్ ఫాస్ట్ ఫుడ్ ఆర్డర్స్,సుల్లూరుపేట</h1>
  <!-- Navigation Buttons -->
  <div class="nav-buttons">
    <button onclick="showPage('home')">Home</button>
    <button onclick="showPage('contact')">Contact</button>
    <button onclick="showPage('scanner')">Scanner</button>
    <button onclick="showPage('query')">Query</button>
  </div>

  <!-- Page Content -->
  <div id="page-content">Click a button above to see details.</div>

  <!-- Product Cards -->
  <div class="products" id="products"></div>

  <!-- Cart Section -->
  <div class="cart">
    <h2>🛒 Cart</h2>
    <div id="cart-items"></div>
    <h3 id="total-price">Total Price: ₹0</h3>
    <button class="place-order" onclick="placeOrder()">Place Order</button>
  </div>
<marquee behavior="scroll" direction="left" scrollamount="5" style="color:darkred; font-size:20px; font-weight:bold;">
🎉 ప్రసాద్ ఫాస్ట్ ఫుడ్ ఆర్డర్స్ ఆన్‌లైన్ | చిరునామా: సుల్లూరుపేట, బాపూజీ కాలనీ | మరిన్ని వివరాలకు సంప్రదించండి: 9573572830
</marquee>

  <script>
    const products = [
      { id: 0, name: "Chicken Biryani", price: 120, image:"../onlineshopping/public/chickenbiryani.jpg" },
      { id: 1, name: "Mutton Biryani", price: 220, image:"../onlineshopping/public/muttonbiryani.jpeg" },
       { id: 3, name: "Fried Rice chicken", price: 130, image:"../onlineshopping/public/chickenfriedrice.webp" },
      { id: 2, name: "Fried Rice Egg", price: 110, image:"../onlineshopping/public/eggfriedrice.jpg" },
      { id: 3, name: "Fried Rice Veg", price: 100, image:"../onlineshopping/public/vegfriedrice.jpg" },
      { id: 4, name: "Fried Leg Pieces", price: 100, image:"../onlineshopping/public/chickenlollypop.jpg" },
      { id: 5, name: "Fried Chicken Pakoda", price: 130, image:"../onlineshopping/public/chickenpakoda.jpeg" },
      { id: 6, name: "Fish Fried", price: 70, image:"../onlineshopping/public/friedfish.jpeg" },
      { id: 7, name: "Prawns", price: 180, image:"../onlineshopping/public/friedprawns.jpeg" }
    ];

    let cart = [];

    function renderProducts() {
      const container = document.getElementById("products");
      container.innerHTML = "";
      products.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <h3>${product.name}</h3>
          <p>Price: ₹${product.price}</p>
          <button onclick="addToCart(${product.id})">Add to Cart</button>
        `;
        container.appendChild(card);
      });
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ ...product, qty: 1 });
      }
      renderCart();
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      renderCart();
    }

    function renderCart() {
      const cartContainer = document.getElementById("cart-items");
      cartContainer.innerHTML = "";
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.qty;
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          ${item.name} - Qty: ${item.qty} - ₹${item.price * item.qty}
          <span class="delete-btn" onclick="removeFromCart(${item.id})">Delete</span>
        `;
        cartContainer.appendChild(div);
      });
      document.getElementById("total-price").innerText = "Total Price: ₹" + total;
    }

    function placeOrder() {
      if (cart.length === 0) {
        alert("Cart is empty!");
        return;
      }
      const now = new Date();
      const currentDate = now.toLocaleDateString("en-IN");
      const currentTime = now.toLocaleTimeString("en-IN");

      let message = "Welcome to Rajani Fast Food Center 🍴\n\nYour Order:\n";
      cart.forEach(item => {
        message += `${item.name} - Qty: ${item.qty}, Price: ₹${item.price}, Total: ₹${item.price * item.qty}\n`;
      });
      const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      message += `\nGrand Total: ₹${total}\nDate: ${currentDate}\nTime: ${currentTime}`;

      const whatsappNumber = "9573572830";
      const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }

    // Navigation button actions
    function showPage(page) {
      const content = document.getElementById("page-content");
      if (page === "home") {
        content.innerHTML = "<h3>🏠 Home</h3><p>Welcome to Rajani Fast Food! Order delicious biryani and fried rice online.</p>";
      } else if (page === "contact") {
        content.innerHTML = "<h3>📞 Contact</h3><p>Call us at 9573572830 or WhatsApp your order.</p>";
       } else if (page === "scanner") {
    // ✅ Show gpay.jpg image
    content.innerHTML = `<img src="../onlineshopping/public/gpay.jpg" alt="GPay Scanner" style="width:300px; border:1px solid #ccc; border-radius:8px;">`;
      } else if (page === "query") {
        content.innerHTML = "<h3>❓ Query</h3><p>pantrangam hariprasad gpay/phone pay number:9573572830</p>";
      }
    }

    // Initial render
    renderProducts();
  </script>

</body>
</html>
