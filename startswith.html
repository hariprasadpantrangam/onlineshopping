  <script>
function verifycard() {
    var cardnumber = document.getElementById("txtcard").value.toLowerCase();
    var cardimage = document.getElementById("cardimg");

    if (cardnumber.includes("4444")) {
        cardimage.src = "../onlineshopping/public/mango.jpeg";
    } 
    else if (cardnumber.includes("5555")) {
        cardimage.src = "../onlineshopping/public/avengers.jpg";
    } 
    else if (cardnumber.includes("hariprasad") || cardnumber.includes("hari")) {
        cardimage.src = "../onlineshopping/public/hari.jpeg";
    } 

       else if (cardnumber.includes("jaswanth") || cardnumber.includes("jas")) {
        cardimage.src = "../onlineshopping/public/jaswanth.jpg";
    } 
         else if (cardnumber.includes("saiteja")  || cardnumber.includes("sai") || cardnumber.includes("teja")) {
        cardimage.src = "../onlineshopping/public/saiteja.jpg";
    } 
    else if (cardnumber.includes("anushka") || cardnumber.endsWith("shka")) {
        cardimage.src = "../onlineshopping/public/anushka.jpg";
    } 
    else if (cardnumber.includes("anusha") || cardnumber.endsWith("sha")) {
        cardimage.src = "../onlineshopping/public/anusha.jpg";
    }
    else if (cardnumber.includes("chiru") || cardnumber.includes("chi")) {
        cardimage.src = "../onlineshopping/public/chiru.jpg";
    } 

     else if (cardnumber.includes("ven") || cardnumber.includes("venkatesh")) {
        cardimage.src = "../onlineshopping/public/father.jpeg";
    } 
    else {
        cardimage.src = "";
        cardimage.alt = "invalid number format";
    }
}
</script>
