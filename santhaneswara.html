    /* Info Box */
    #info-box {

      text-align: center;

    .login-box {
      background: rgba(0,0,0,0.7);

      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

      margin-bottom: 20px;
    }
    .login-box input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    .login-box button {
      width: 95%;
      padding: 10px;
      background: #ffd700;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #ff9900;
    }

    /* Temple Icons */
    .temples {
      display: flex;
      
      justify-content: center;
      flex-wrap:wrap;
      margin: 40px 0;
      gap: 30px;
    }
    .temple {
      background: rgba(0,0,0,0.6);
      width: 140px;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
      transition: transform 0.3s;
      padding: 10px;
      border-radius: 50%;
    }
    .temple img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 8px;
    }
    .temple:hover {
      transform: scale(1.1);
      background: #ffd700;
      color: black;
    }
  </style>
