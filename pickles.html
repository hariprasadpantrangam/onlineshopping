<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chandana Pickles</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .card { border: 1px solid #ddd; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; width: 200px; display:inline-block; vertical-align:top; }
    .card img { width:100%; height:150px; border-radius:8px; object-fit:cover; }
    .order-btn { background:#2ecc71; color:white; border:none; padding:10px; width:100%; cursor:pointer; border-radius:5px; }
    #cartItems li { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px; }
    #cartItems img { width:40px; height:40px; object-fit:cover; border-radius:5px; }
    #cartSummary { margin-top:20px; border:1px solid #ddd; padding:15px; border-radius:10px; width:350px; }
    #whatsappBtn { background:#25D366; color:white; border:none; padding:10px; width:100%; cursor:pointer; border-radius:5px; margin-top:10px; font-weight:bold; }
  </style>
</head>
<body>

<h1>🍋 Chandana Pickles</h1>

<div id="userCardContainer"></div>

<div id="cartSummary">
  <h2>Your Cart 🛒</h2>
  <ul id="cartItems"></ul>
  <p><strong>Total: ₹<span id="cartTotal">0</span></strong></p>
  <button id="whatsappBtn" onclick="sendToWhatsApp()">Confirm Order (WhatsApp)</button>
</div>

<script>
let cart = [];

const defaultPickles = [
  { name: "Mango Pickle", price: 120, image: "mango.jpeg" },
  { name: "Lemon Pickle", price: 130, image: "lemon.jpeg" },
  { name: "Garlic Pickle", price: 140, image: "garlic.jpeg" },
  { name: "Tomato Pickle", price: 130, image: "tomato.jpeg" },
  { name: "Usiri Pickle", price: 150, image: "usiri.jpeg" },
  { name: "Red Mirchi Pickle", price: 160, image: "redmirchi.jpeg" },
  { name: "Ginger Pickle", price: 140, image: "ginger.jpeg" },
  { name: "Gongura Pickle", price: 150, image: "gongura.jpeg" },
  { name: "Karivepaku Pickle", price: 150, image: "karivepaku.jpeg" },
  { name: "Tamarind Pickle", price: 140, image: "tamarind.jpeg" },
  { name: "Kakara Pickle", price: 130, image: "kakara.jpeg" }
];

let products = JSON.parse(localStorage.getItem('pickles')) || defaultPickles;

// యూజర్ ప్యానెల్ - కార్డ్ ఫార్మాట్
function displayUserProducts() {
  const container = document.getElementById('userCardContainer');
  container.innerHTML = "";
  
  products.forEach((p, index) => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150'">
        <h3>${p.name}</h3>
        <p style="color:#2ecc71; font-weight:bold;">₹${p.price}</p>
        <button class="order-btn" onclick="addToCart(${index})">Add to Cart</button>
      </div>`;
  });
}

// కార్ట్‌లో ఐటమ్ యాడ్ చేయడం
function addToCart(index) {
  if (products && products[index]) {
    const item = products[index];
    cart.push({...item});
    updateCartUI();
  }
}

// కార్ట్ నుండి ఐటమ్ తొలగించడం
function removeFromCart(cartIndex) {
  cart.splice(cartIndex, 1);
  updateCartUI();
}

// కార్ట్ UI అప్డేట్
function updateCartUI() {
  const cartList = document.getElementById('cartItems');
  const totalSpan = document.getElementById('cartTotal');
  
  cartList.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    total += parseInt(item.price) || 0;
    cartList.innerHTML += `
      <li>
        <div style="display:flex; align-items:center; gap:10px;">
          <img src="${item.image}" onerror="this.src='https://via.placeholder.com/40'">
          <span>${item.name} - ₹${item.price}</span>
        </div>
        <button onclick="removeFromCart(${index})" style="background:#e74c3c; color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:3px;">Delete</button>
      </li>`;
  });
  totalSpan.innerText = total.toLocaleString('en-IN');
}

// WhatsApp Integration
function sendToWhatsApp() {
  if (cart.length === 0) {
    alert("మీ కార్ట్ ఖాళీగా ఉంది! దయచేసి ఐటమ్స్ యాడ్ చేయండి.");
    return;
  }

  const phoneNumber = "919573572830"; // నీ WhatsApp నంబర్

  const now = new Date();
  const date = now.toLocaleDateString();
  const time = now.toLocaleTimeString();

  let message = "📦 *NEW PICKLE ORDER*\n";
  message += "--------------------------\n";
  message += `📅 *Date:* ${date}\n`;
  message += `⏰ *Time:* ${time}\n`;
  message += "--------------------------\n";
  message += "*Items Ordered:*\n";

  cart.forEach((item, index) => {
    message += `${index + 1}. ${item.name} - ₹${item.price}\n`;
  });

  const total = document.getElementById('cartTotal').innerText;
  message += "--------------------------\n";
  message += `💰 *Total Amount: ₹${total}*\n\n`;
  message += "Please confirm my order! 🙏";

  const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;
  window.open(whatsappUrl, '_blank');
}

// మొదట ప్రొడక్ట్స్ చూపించు
displayUserProducts();
</script>

</body>
</html>
